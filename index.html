<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aurea | Premium Services</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">AUREA</div>
        <p class="credit">Powered by ENES DEVA</p>
    </header>

    <nav class="categories">
        <button onclick="loadProducts()">Hepsi</button>
        <button onclick="loadProducts('TEKSTİL')">TEKSTİL</button>
    </nav>

    <main id="app">
        <div id="product-list" class="grid"></div>
    </main>

    <div id="admin-modal" class="custom-modal">
        <div class="modal-inner">
            <h2>💎 Aurea Yönetim</h2>
            <form id="add-form">
                <select id="cat" required>
                    <option value="TEKSTİL">tekstil</option>
                </select>
                <input type="text" id="title" placeholder="Ürün/Hizmet Adı" required>
                <textarea id="desc" placeholder="Kısa Açıklama" required></textarea>
                <div class="input-row">
                    <input type="number" id="price" placeholder="Fiyat (TL)" required>
                    <input type="text" id="stock" placeholder="Stok Durumu">
                </div>
                
                <div class="image-upload-group">
                    <label for="gorsel-input" class="file-upload-btn">
                        🖼️ Galeriden Ürün Görseli Seç
                    </label>
                    <input type="file" id="gorsel-input" accept="image/*" style="display: none;">
                    
                    <div id="preview-container" class="gorsel-onizleme-kutusu">
                        <img id="form-gorsel-onizleme" src="" alt="Önizleme">
                    </div>
                </div>

                <button type="submit" id="save-btn" class="gold-btn">Sisteme Yükle</button>
            </form>
            
            <div class="admin-divider">Yayındaki Ürünler</div>
            <div id="admin-product-list"></div>
            
            <button onclick="closeAdmin()" class="gold-btn outline">Kapat</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgC6geqJF_uk3joWf9OBpDzti-LPni9Rw",
            authDomain: "aurea-project-faa4e.firebaseapp.com",
            projectId: "aurea-project-faa4e",
            storageBucket: "aurea-project-faa4e.firebasestorage.app",
            messagingSenderId: "327537229493",
            appId: "1:327537229493:web:1fd66fa25ee75e1bd3c8fc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const wpNo = "905050619393";

        // Seçilen görselin Base64 verisini tutacak değişken
        let globalGorselData = "";

        // Görsel Seçildiğinde Önizleme Yapan Mekanizma
        document.getElementById('gorsel-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    globalGorselData = event.target.result;
                    document.getElementById('form-gorsel-onizleme').src = globalGorselData;
                    document.getElementById('preview-container').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Ürünleri Getir
        window.loadProducts = (filter = null) => {
            const q = filter ? query(collection(db, "urunler"), where("kategori", "==", filter)) : collection(db, "urunler");
            onSnapshot(q, (snap) => {
                const list = document.getElementById('product-list');
                const adminList = document.getElementById('admin-product-list');
                list.innerHTML = ""; if(adminList) adminList.innerHTML = "";
                
                snap.forEach(d => {
                    const item = d.data();
                    
                    // Eğer üründe özel görsel yüklüyse onu kullan, yoksa varsayılan boş resim ikonu göster
                    const urunResmi = item.gorsel ? item.gorsel : "https://img.icons8.com/fluency/144/image.png";

                    // Vitrin Kartı (Artık senin yüklediğin görselleri tam boy gösterecek şekilde ayarlandı)
                    list.innerHTML += `
                        <div class="card">
                            <div class="card-img-wrapper">
                                <img src="${urunResmi}" class="card-icon">
                            </div>
                            <h3>${item.baslik}</h3>
                            <div class="card-info"><span>💰 ${item.fiyat} TL</span><span>📦 ${item.stok || 'Mevcut'}</span></div>
                            <button class="buy-btn" onclick="buyWP('${item.baslik}', '${item.fiyat}')">Satın Al</button>
                        </div>`;
                    
                    // Admin Listesi
                    if(adminList) {
                        adminList.innerHTML += `<div class="admin-item"><span>${item.baslik}</span><button onclick="deleteProduct('${d.id}')">SİL</button></div>`;
                    }
                });
            });
        };

        // WhatsApp Yönlendirme
        window.buyWP = (title, price) => {
            const msg = `Merhaba Aurea, "${title}" ürününü ${price} TL karşılığında satın almak istiyorum.`;
            window.open(`https://wa.me/${wpNo}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.deleteProduct = async (id) => { if(confirm("Ürünü sil?")) await deleteDoc(doc(doc(db, "urunler", id))); };
        
        // Admin Giriş
        function checkAdmin() {
            if(window.location.hash === "#admin") {
                if(prompt("Aurea Şifre:") === "78780078") document.getElementById('admin-modal').style.display = 'flex';
                else window.location.hash = "";
            }
        }
        window.closeAdmin = () => { document.getElementById('admin-modal').style.display = 'none'; window.location.hash = ""; };
        window.addEventListener('hashchange', checkAdmin);
        
        // Ürün Ekleme (Görsel Verisiyle Birlikte Firebase'e Kaydeder)
        document.getElementById('add-form').onsubmit = async (e) => {
            e.preventDefault();
            
            await addDoc(collection(db, "urunler"), {
                kategori: document.getElementById('cat').value,
                baslik: document.getElementById('title').value,
                aciklama: document.getElementById('desc').value,
                fiyat: document.getElementById('price').value,
                stok: document.getElementById('stock').value,
                gorsel: globalGorselData // Yeni görsel string alanı eklendi
            });
            
            // Formu ve görsel önizlemeyi sıfırla
            document.getElementById('add-form').reset();
            document.getElementById('preview-container').style.display = 'none';
            globalGorselData = "";
            
            alert("Ürün görseliyle birlikte başarıyla eklendi!");
        };

        loadProducts();
        checkAdmin();
    </script>
</body>
</html>
