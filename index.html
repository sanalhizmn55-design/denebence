<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özel Link Kısaltıcı</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h2 { margin-bottom: 20px; color: #00adb5; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #333;
            border-radius: 6px;
            background: #252525;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00adb5;
            border: none;
            color: #fff;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background: #007c82; }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #2d2d2d;
            border-radius: 6px;
            display: none;
            word-break: break-all;
        }
        .result a { color: #00adb5; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Özel Link Kısaltıcı</h2>
    
    <input type="url" id="longUrl" placeholder="Kısaltılacak Uzun URL (https://...)" required>
    <input type="text" id="customAlias" placeholder="İstediğiniz Özel İsim (Örn: instagram)" required>
    
    <button id="shortenBtn">Linki Kısalt</button>

    <div class="result" id="resultDiv">
        <p>Kısa Linkiniz Hazır! 🎉</p>
        <a href="#" id="shortLink" target="_blank"></a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Enes Bey, sizin Firebase bilgileriniz buraya başarıyla eklendi:
    const firebaseConfig = {
        apiKey: "AIzaSyANYynbcsN8dgRoqZL_y9C7tKCH_WNVK2Q",
        authDomain: "gelbence-dd8de.firebaseapp.com",
        projectId: "gelbence-dd8de",
        storageBucket: "gelbence-dd8de.firebasestorage.app",
        messagingSenderId: "73726812133",
        appId: "1:73726812133:web:e336c100bfd7f9b46c590c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const shortenBtn = document.getElementById('shortenBtn');
    const resultDiv = document.getElementById('resultDiv');
    const shortLink = document.getElementById('shortLink');

    shortenBtn.addEventListener('click', async () => {
        const longUrl = document.getElementById('longUrl').value.trim();
        const customAlias = document.getElementById('customAlias').value.trim().toLowerCase().replace(/[^a-z0-9-_]/g, ''); 

        if (!longUrl || !customAlias) {
            alert('Lütfen tüm alanları doldurun!');
            return;
        }

        try {
            const docRef = doc(db, "links", customAlias);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                alert("Bu özel isim daha önce alınmış! Lütfen başka bir isim deneyin.");
                return;
            }

            await setDoc(docRef, {
                url: longUrl,
                createdAt: new Date()
            });

            const currentHost = window.location.origin + window.location.pathname;
            const finalShortUrl = `${currentHost}?id=${customAlias}`;

            shortLink.href = finalShortUrl;
            shortLink.innerText = finalShortUrl;
            resultDiv.style.display = 'block';

        } catch (error) {
            console.error("Hata oluştu: ", error);
            alert("Veritabanına bağlanırken bir hata oluştu!");
        }
    });

    const urlParams = new URLSearchParams(window.location.search);
    const aliasParam = urlParams.get('id');

    if (aliasParam) {
        const docRef = doc(db, "links", aliasParam);
        getDoc(docRef).then((docSnap) => {
            if (docSnap.exists()) {
                window.location.href = docSnap.data().url;
            } else {
                alert("Bu kısa link sistemde bulunamadı veya silinmiş!");
            }
        });
    }
</script>

</body>
</html>
