<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aurea | Premium Services</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">AUREA</div>
        <p class="credit">Powered by ENES DEVA</p>
    </header>

    <nav class="categories">
        <button onclick="filter('PUBG MOBİLE')">PUBG MOBİLE</button>
        <button onclick="filter('Ecommerce')">E-Ticaret</button>
        <button onclick="filter('Business')">Dükkan</button>
        <button onclick="filter('Instagram')">Instagram</button>
    </nav>

    <main id="app">
        <div id="product-list" class="grid">
            </div>
    </main>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <h2>Aurea Admin Panel</h2>
            <form id="add-form">
                <select id="cat" required>
                    <option value="PUBG">PUBG Mobile</option>
                    <option value="Ecommerce">E-Ticaret</option>
                    <option value="Business">Dükkan Reklam</option>
                    <option value="Instagram">Instagram Reklam</option>
                </select>
                <input type="text" id="title" placeholder="İlan Başlığı" required>
                <textarea id="desc" placeholder="Detaylı Açıklama" required></textarea>
                <div class="row">
                    <input type="number" id="price" placeholder="Fiyat (TL)" required>
                    <input type="text" id="stock" placeholder="Stok/Durum">
                </div>
                <input type="text" id="speed" placeholder="Teslimat Hızı (Örn: 15 Dakika)">
                <button type="submit" id="save-btn">Sisteme Yükle</button>
                <button type="button" onclick="closeAdmin()" class="cancel">Kapat</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgC6geqJF_uk3joWf9OBpDzti-LPni9Rw",
            authDomain: "aurea-project-faa4e.firebaseapp.com",
            projectId: "aurea-project-faa4e",
            storageBucket: "aurea-project-faa4e.firebasestorage.app",
            messagingSenderId: "327537229493",
            appId: "1:327537229493:web:1fd66fa25ee75e1bd3c8fc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Kategoriye Göre Resimler (Senin logondan ilham alındı)
        const catImages = {
            "PUBG": "https://img.icons8.com/color/144/pubg.png",
            "Ecommerce": "https://img.icons8.com/fluency/144/shopping-cart-promotion.png",
            "Business": "https://img.icons8.com/fluency/144/shop.png",
            "Instagram": "https://img.icons8.com/fluency/144/instagram-new.png"
        };

        // Ürünleri Listele
        const productList = document.getElementById('product-list');
        onSnapshot(collection(db, "urunler"), (snapshot) => {
            productList.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                productList.innerHTML += `
                    <div class="card">
                        <img src="${catImages[data.kategori]}" class="cat-icon">
                        <h3>${data.baslik}</h3>
                        <p>${data.aciklama}</p>
                        <div class="details">
                            <span>💰 ${data.fiyat} TL</span>
                            <span>📦 ${data.stok}</span>
                        </div>
                        <div class="speed">⚡ ${data.hiz}</div>
                        <button class="buy-btn">Satın Al</button>
                    </div>
                `;
            });
        });

        // Ürün Ekleme (Admin)
        document.getElementById('add-form').onsubmit = async (e) => {
            e.preventDefault();
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "Yükleniyor...";

            await addDoc(collection(db, "urunler"), {
                kategori: document.getElementById('cat').value,
                baslik: document.getElementById('title').value,
                aciklama: document.getElementById('desc').value,
                fiyat: document.getElementById('price').value,
                stok: document.getElementById('stock').value,
                hiz: document.getElementById('speed').value,
                tarih: Date.now()
            });

            saveBtn.disabled = false;
            saveBtn.innerText = "Sisteme Yükle";
            document.getElementById('add-form').reset();
            alert("Aurea Sistemine Başarıyla Eklendi!");
        };

        // Admin Panel Kontrolü
        window.addEventListener('hashchange', checkAdmin);
        function checkAdmin() {
            if(window.location.hash === "#admin") {
                const pass = prompt("Aurea Admin Şifresi:");
                if(pass === "78780078450") {
                    document.getElementById('admin-modal').style.display = 'flex';
                } else {
                    window.location.hash = "";
                }
            }
        }
        window.closeAdmin = () => {
            document.getElementById('admin-modal').style.display = 'none';
            window.location.hash = "";
        };
        checkAdmin();
    </script>
</body>
</html>
