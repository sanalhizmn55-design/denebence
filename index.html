<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>aurea enes deva</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body, html { width: 100%; height: 100%; background: #0b0b0b; color: #fff; overflow: hidden; }
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: #0f0f12; transition: opacity 1s ease; }
        .hidden { opacity: 0; pointer-events: none; }

        /* GİRİŞ EKRANI */
        .vip-btn { padding: 20px 50px; font-size: 24px; font-weight: bold; background: linear-gradient(45deg, #d4af37, #f1c40f); border: none; border-radius: 50px; cursor: pointer; z-index: 20; box-shadow: 0 0 30px rgba(212,175,55,0.5); }
        
        #intro-container { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        
        /* Kalp Çizgisi */
        .ecg-svg { position: absolute; width: 80%; height: 200px; display: none; }
        .ecg-path { fill: none; stroke: #ff0000; stroke-width: 4; stroke-dasharray: 2000; stroke-dashoffset: 2000; }
        
        /* 100 Çizgili Aslan */
        .lion-svg { position: absolute; width: 400px; height: 400px; display: none; }
        .lion-path { fill: none; stroke: #d4af37; stroke-width: 2; stroke-dasharray: 1000; stroke-dashoffset: 1000; }

        /* Diğer bölümler aynı kalıyor */
        .auth-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid #d4af37; width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #444; color: #fff; }
        .auth-btn { width: 100%; padding: 10px; background: #d4af37; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="intro-screen" class="screen">
        <button class="vip-btn" id="start-btn">AUREA ENES DEVA VIP GİRİŞ</button>
        <div id="intro-container">
            <svg class="ecg-svg" id="ecg-box" viewBox="0 0 1000 200">
                <path class="ecg-path" id="ecg-line" d="M0,100 L200,100 L220,50 L240,150 L260,100 L800,100 L820,20 L840,180 L860,100 L1000,100"/>
            </svg>
            <svg class="lion-svg" id="lion-box" viewBox="0 0 100 100">
                <!-- 100 segmentli aslan konturu -->
                <path class="lion-path" id="lion-line" d="M50,10 C70,10 80,20 80,30 C80,50 70,60 50,60 C30,60 20,50 20,30 C20,20 30,10 50,10 M50,60 L50,90 M50,90 L30,100 M50,90 L70,100 M30,30 L35,35 M65,30 L60,35 M40,45 Q50,50 60,45" stroke-dasharray="2000" />
            </svg>
        </div>
    </div>

    <!-- GİRİŞ VE DİĞER EKRANLAR -->
    <div id="auth-screen" class="screen hidden">
        <div class="auth-card">
            <h2>Giriş Yap</h2>
            <input type="text" id="username-input" placeholder="İsim Soyisim">
            <input type="password" id="password-input" placeholder="Şifre">
            <button class="auth-btn" id="login-submit">GİRİŞ</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Ses: Kalp Atış Bip
        function playBip() {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // Ses: Aslan Kükremesi
        function playGrowl() {
            let osc = audioCtx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(80, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 2);
            let gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 2);
        }

        document.getElementById('start-btn').addEventListener('click', async () => {
            await audioCtx.resume();
            document.getElementById('start-btn').style.display = 'none';

            // 1. Kalp Ritmi ve Bip (10 Saniye)
            const ecg = document.getElementById('ecg-box');
            const ecgLine = document.getElementById('ecg-line');
            ecg.style.display = 'block';
            ecgLine.style.transition = "stroke-dashoffset 10s linear";
            ecgLine.style.strokeDashoffset = "0";
            
            let interval = setInterval(playBip, 1000); // 10 saniye boyunca bip
            setTimeout(() => { clearInterval(interval); ecg.style.display = 'none'; }, 10000);

            // 2. Aslan Kükremesi ve 100 Çizgi ile Çizilme (10 Saniye)
            setTimeout(() => {
                playGrowl();
                const lion = document.getElementById('lion-box');
                const lionLine = document.getElementById('lion-line');
                lion.style.display = 'block';
                lionLine.style.transition = "stroke-dashoffset 10s linear";
                lionLine.style.strokeDashoffset = "0";

                // 20. saniyede Giriş Ekranına Geç
                setTimeout(() => {
                    document.getElementById('intro-screen').classList.add('hidden');
                    document.getElementById('auth-screen').classList.remove('hidden');
                }, 10000);
            }, 10000);
        });

        // Şifre Döngü Mantığı
        let stage = localStorage.getItem('aurea_stage') || '78780075';
        document.getElementById('login-submit').addEventListener('click', () => {
            const pass = document.getElementById('password-input').value;
            if(pass === stage) {
                localStorage.setItem('aurea_stage', stage === '78780075' ? '78780076' : '78780075');
                alert("Başarılı!"); // Buradan lobiye yönlendir
            } else {
                window.location.href = "https://wa.me/905518329861";
            }
        });
    </script>
</body>
</html>
